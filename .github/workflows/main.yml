name: Build Multi-Arch Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64, ppc64le, arm]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Required Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-system qemu-kvm virtinst libvirt-daemon-system libvirt-clients

      - name: Check QEMU Version
        run: |
          QEMU_VERSION=$(qemu-system-${{ matrix.arch }} --version | head -n1)
          echo "QEMU Version: $QEMU_VERSION"

      - name: Verify No Outdated QEMU Binaries
        run: |
          if sudo virsh list --outdated | grep -q "No VM guests are running outdated hypervisor"; then
            echo "QEMU is up-to-date. Proceeding with the build."
          else
            echo "Outdated QEMU binaries detected. Updating..."
            sudo apt-get install --only-upgrade qemu-system qemu-utils
          fi

      - name: Download Cirros Image
        run: |
          ./download-cirros --cirros-version 0.6.2 --arch ${{ matrix.arch }} --output cirros-0.6.2-${{ matrix.arch }}.qcow2

      - name: Convert to Compressed QCOW2
        run: |
          qemu-img convert -f qcow2 -O qcow2 -c cirros-0.6.2-${{ matrix.arch }}.qcow2 cirros-${{ matrix.arch }}-compressed.qcow2

      - name: Build and Push Multi-Arch Image
        run: |
          podman build --tag quay.io/your-repo/cirros:${{ matrix.arch }} --build-arg disk=cirros-${{ matrix.arch }}-compressed.qcow2 .
          podman push quay.io/your-repo/cirros:${{ matrix.arch }}
